services:
  - type: web
    name: airspider-osint
    env: docker
    plan: free
    region: ohio
    # Render will automatically detect the port from the Dockerfile's EXPOSE instruction.
    # We provide the PORT environment variable below for absolute certainty.
    healthCheckPath: /
    # numInstances: 1 (Default is 1, so we'll omit to keep it clean)
    envVars:
      - key: PORT
        value: 5001
      - key: PYTHONUNBUFFERED
        value: 1
    # uncomment to enable persistent storage (requires paid plan)
    # disk:
    #   name: airspider-data
    #   mountPath: /var/lib/airspider
    #   sizeGB: 1
